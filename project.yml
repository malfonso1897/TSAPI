name: TSAPI
options:
  bundleIdPrefix: com.talentosostenible
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  TSAPI:
    type: application
    platform: macOS
    sources:
      - path: Sources/TSAPIApp
    dependencies:
      - package: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.talentosostenible.tsapi
        PRODUCT_NAME: TSAPI
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        INFOPLIST_KEY_CFBundleDisplayName: TSAPI
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHighResolutionCapable: true
    entitlements:
      path: TSAPI.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
